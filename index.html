<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital - Restaurante Valentina</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos base alineados a la arquitectura del proyecto */
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #333;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }
        .lang-selector {
            text-align: right;
            margin-bottom: 20px;
        }
        .btn-lang {
            padding: 8px 15px;
            cursor: pointer;
            border: 1px solid #2c3e50;
            background: white;
            border-radius: 5px;
        }
        .menu-item {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-info img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            margin-right: 15px;
        }
        .price {
            font-weight: bold;
            color: #e67e22;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<header>
    <h1 id="rest-name">Restaurante Valentina</h1>
    <p id="rest-tagline">Modernización Digital 2026</p>
</header>

<div class="container">
    <div class="lang-selector">
        <button class="btn-lang" onclick="changeLang('es')">Español</button>
        <button class="btn-lang" onclick="changeLang('en')">English</button>
    </div>

    <div id="menu-container">
        <p>Cargando menú...</p>
    </div>
</div>

<script>
    // Configuración inicial del proyecto 
    const SHEET_ID = 'TU_ID_DE_GOOGLE_SHEETS_AQUI'; // Reemplazar con el ID real
    const TAB_NAME = 'Hoja1';
    const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${TAB_NAME}`;

    let currentLang = 'es';
    let menuData = [];

    // Función para obtener datos de Google Sheets 
    async function loadMenu() {
        try {
            const response = await fetch(API_URL);
            const text = await response.text();
            const data = JSON.parse(text.substr(47).slice(0, -2));
            
            // Mapeo de columnas (A=Nombre, B=Descripción, C=Precio, D=Imagen, E=Inglés...)
            menuData = data.table.rows.map(row => ({
                nombre: row.c[0]?.v,
                desc: row.c[1]?.v,
                precio: row.c[2]?.v,
                img: row.c[3]?.v || 'https://via.placeholder.com/80',
                nombreEn: row.c[4]?.v,
                descEn: row.c[5]?.v
            }));
            
            renderMenu();
        } catch (error) {
            console.error("Error cargando el menú:", error);
            document.getElementById('menu-container').innerHTML = "<p>Error al conectar con la base de datos.</p>";
        }
    }

    function renderMenu() {
        const container = document.getElementById('menu-container');
        container.innerHTML = '';

        menuData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            div.innerHTML = `
                <div class="item-info" style="display: flex; align-items: center;">
                    <img src="${item.img}" alt="Platillo">
                    <div>
                        <strong>${currentLang === 'es' ? item.nombre : item.nombreEn}</strong><br>
                        <small>${currentLang === 'es' ? item.desc : item.descEn}</small>
                    </div>
                </div>
                <div class="price">$${item.precio}</div>
            `;
            container.appendChild(div);
        });
    }

    function changeLang(lang) {
        currentLang = lang;
        renderMenu();
    }

    // Iniciar carga [cite: 60]
    loadMenu();
</script>

</body>
</html>
